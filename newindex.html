<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Solar Grid Optimizer Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="style.css">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/suncalc@1.9.0/suncalc.js"></script>

<style>

/* ================= THEME ================= */
:root{
    --bg:#f4f7ff;
    --card:#ffffff;
    --text:#1e293b;
    --muted:#64748b;
    --border:#e5e7eb;
    --sidebar:#0f172a;
}

body.dark{
    --bg:#0b1220;
    --card:#111827;
    --text:#e5e7eb;
    --muted:#94a3b8;
    --border:#1f2937;
    --sidebar:#020617;
}

/* ================= BODY ================= */
body{
    margin:0;
    font-family:Segoe UI;
    background:var(--bg);
    color:var(--text);
    transition:0.3s;
}

/* ================= HEADER ================= */
.header{
    position:fixed;
    top:0;
    left:0;
    right:0;
    height:60px;
    z-index:1000;
    background:rgba(255,255,255,0.75);
    backdrop-filter:blur(12px);
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 15px;
    border-bottom:1px solid var(--border);
}

body.dark .header{
    background:rgba(17,24,39,0.75);
}

/* ================= SIDEBAR ================= */
.sidebar{
    position:fixed;
    top:60px;
    left:0;
    width:250px;
    height:calc(100vh - 60px);
    background:var(--sidebar);
    padding-top:15px;
    transition:0.3s;
    overflow:hidden;
}

.sidebar a{
    display:flex;
    align-items:center;
    gap:12px;
    padding:12px 15px;
    color:#cbd5e1;
    text-decoration:none;
}

.sidebar a:hover{
    background:rgba(255,255,255,0.08);
    color:#fff;
}

.sidebar.collapsed{ width:70px; }
.sidebar.collapsed a span{ display:none; }

/* ================= CONTENT ================= */
.content{
    margin-left:250px;
    margin-top:60px;
    padding:20px;
    transition:0.3s;
}

.sidebar.collapsed ~ .content{
    margin-left:70px;
}

/* ================= CARD ================= */
.card-pro{
    background:var(--card);
    color:var(--text);
    border:1px solid var(--border);
    border-radius:16px;
    box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

/* ================= BUTTON ================= */
.btn-soft{
    background:#eef2ff;
    border:none;
}

body.dark .btn-soft{
    background:#1f2937;
    color:#fff;
}

/* GRID */
#grid{
    display:grid;
    gap:6px;
    margin-top:15px;
}

.cell{
    width:40px;
    height:40px;
    background:#4f46e5;
    border-radius:6px;
    opacity:0.8;
}

</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
    <div class="d-flex align-items-center gap-2">
        <button class="btn btn-sm btn-soft" onclick="toggleSidebar()">
            <i class="bi bi-list"></i>
        </button>
        <b>Solar Grid Optimizer</b>
    </div>

    <div class="d-flex align-items-center gap-3">
        <i class="bi bi-moon toggle" onclick="toggleDark()"></i>
        <i class="bi bi-person-circle fs-4"></i>
    </div>
</div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
    <a href="#"><i class="bi bi-speedometer2"></i><span>Dashboard</span></a>
    <a href="#"><i class="bi bi-sun"></i><span>Solar Grid</span></a>
    <a href="#"><i class="bi bi-graph-up"></i><span>Analytics</span></a>
    <a href="#"><i class="bi bi-gear"></i><span>Settings</span></a>
</div>

<!-- CONTENT -->
<div class="content">

    <h4 class="mb-3">☀️ Solar Grid Control Panel</h4>

    <!-- CONTROLS CARD -->
    <div class="card card-pro p-3 mb-4">

        <div class="row g-2">

            <div class="col-md-2">
                <label>Rows</label>
                <input type="number" id="rowsInput" class="form-control" value="6">
            </div>

            <div class="col-md-2">
                <label>Cols</label>
                <input type="number" id="colsInput" class="form-control" value="7">
            </div>

            <div class="col-md-2">
                <label>Land (sq.ft)</label>
                <input type="number" id="landArea" class="form-control" value="1000">
            </div>

            <div class="col-md-3">
                <label>Sun Mode</label>
                <select id="sunMode" class="form-select" onchange="changeSunMode()">
                    <option value="auto">Auto</option>
                    <option value="manual">Manual</option>
                </select>
            </div>

            <div class="col-md-3">
                <label>Manual Direction</label>
                <select id="manualSun" class="form-select" onchange="setManualSun()" disabled>
                    <option value="top">Top</option>
                    <option value="bottom">Bottom</option>
                    <option value="left">Left</option>
                    <option value="right">Right</option>
                </select>
            </div>

        </div>

        <div class="mt-3 d-flex flex-wrap gap-2">
            <button class="btn btn-primary" onclick="createGrid()">Create Grid</button>
            <button class="btn btn-warning" onclick="calculateGridFromLand()">Auto Grid</button>
            <button class="btn btn-success" onclick="autoOptimize()">⚡ Auto Optimize</button>
            <button class="btn btn-info" onclick="calculateEfficiency()">Analyze</button>
            <button class="btn btn-danger" onclick="resetGrid()">Reset</button>
        </div>

    </div>

    <!-- INFO CARD -->
    <div class="card card-pro p-3 mb-3">
        <div class="row">
            <div class="col-md-3">☀️ Sun: <b id="sunDirText">TOP</b></div>
            <div class="col-md-3">Tilt: <span id="tiltAngle">0</span>°</div>
            <div class="col-md-3">Height: <span id="autoHeight">0</span> m</div>
            <div class="col-md-3">Spacing: <span id="autoSpacing">0</span> m</div>

            <div class="col-md-3 mt-2">📍 Location: <span id="locationName">-</span></div>
            <div class="col-md-3 mt-2">🌡 Temp: <span id="temperature">-</span> °C</div>
            <div class="col-md-6 mt-2">Suggested Grid: <span id="gridSuggest">-</span></div>
        </div>
    </div>

    <!-- GRID -->
    <div class="card card-pro p-3">
        <h5>Solar Grid</h5>
        <div id="grid"></div>
    </div>

    <!-- RESULT -->
    <div class="card card-pro p-3 mt-3">
        <h5>Results</h5>
        <h6>Efficiency: <span id="efficiency">0%</span></h6>
        <h6>Energy: <span id="energy">0 kWh</span></h6>
        <h6 id="suggestions"></h6>
    </div>

</div>

<!-- SCRIPT -->
<script>
function toggleSidebar(){
    document.getElementById("sidebar").classList.toggle("collapsed");
}

function toggleDark(){
    document.body.classList.toggle("dark");
}
</script>

<script src="script.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
